<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Convertor</title>
</head>

<body>
    <div id="conversion">
        <div id="heading">
            <h1> Conversion</h1>
        </div>
        <input type="text" id="box" inputmode="numeric" placeholder="Enter A Number" />
        <input type="text" id="Hexbox" class="H-hide" placeholder="Enter A Hexa-Decimal Number" />
        <!-- <input type="text" id="hex-box"/> -->


        <select class="form-select" aria-label="Default select example" id="selectbox1">
            <option selected>Choose The Type</option>
            <option value="1">Binary(2)</option>
            <option value="2">Decimal(10)</option>
            <option value="3">Octal(8)</option>
            <option value="4">Hexa-Decimal(16)</option>
        </select>
        <div id="answer">Output-Box</div>
        <select class="form-select selectbox" aria-label="Default select example" id="selectbox2">
            <option selected>Select The Type</option>
            <option value="1">Binary(2)</option>
            <option value="2">Decimal(10)</option>
            <option value="3">Octal(8)</option>
            <option value="4">Hexa-Decimal(16)</option>
        </select>

        <div class="btn">
            <button id="convert">Convert</button>
            <button id="reset">Reset</button>
        </div>

    </div>
<!-- 
    <footer>
        <p>Made By Priyanshu Sharma</p>
    </footer> -->

    <script src="script.js"></script>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.min.js"
    integrity="sha384-heAjqF+bCxXpCWLa6Zhcp4fu20XoNIA98ecBC1YkdXhszjoejr5y9Q77hIrv8R9i"
    crossorigin="anonymous"></script>

</html>
