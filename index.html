<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
</head>

</html>

<link rel="stylesheet" href="style.css">
<title>Convertor</title>
</head>

<body>

  <div id="conversion">
    <div id="liveAlertPlaceholder" class="h-alert alert1"></div>
    <div id="heading">
      <h1> Conversion</h1>
    </div>
    <input type="text" id="box" inputmode="numeric" placeholder="Enter A Number" />
    <input type="text" id="Hexbox" class="H-hide" placeholder="Enter A Hexa-Decimal Number" />

    <select class="form-select" aria-label="Default select example" id="selectbox1">
      <option selected>Choose The Type</option>
      <option value="1">Binary(2)</option>
      <option value="2">Decimal(10)</option>
      <option value="3">Octal(8)</option>
      <option value="4">Hexa-Decimal(16)</option>
    </select>
    <div id="answer">Output-Box</div>
    <select class="form-select selectbox" aria-label="Default select example" id="selectbox2">
      <option selected>Select The Type</option>
      <option value="1">Binary(2)</option>
      <option value="2">Decimal(10)</option>
      <option value="3">Octal(8)</option>
      <option value="4">Hexa-Decimal(16)</option>
    </select>

    <div class="btn">
      <button id="convert">Convert</button>
      <button id="reset">Reset</button>
    </div>

  </div>
  <script src="script.js"></script>

  <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
